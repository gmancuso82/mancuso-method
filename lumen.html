<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mancuso Method — AI Recovery Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#15140F;--surface:#1F1E1A;--surface2:#26241F;
  --ink:#F1ECDF;--inkSoft:#D6CFBE;--muted:#8E887A;--line:#2C2A24;
  --accent:#D86B4A;--accent2:#E0A878;--tint:rgba(216,107,74,.16);--onAccent:#fff;
  --good:#3F7D5A;--warn:#C95A3F;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow:hidden}
::-webkit-scrollbar{width:0;height:0}
@keyframes lumenDot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-2px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--tint)}50%{box-shadow:0 0 0 6px var(--tint)}}

/* Header */
.header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line);background:var(--bg);flex-shrink:0;z-index:10}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.avatar svg{width:16px;height:16px}
.avatar.pulsing{animation:pulse 1.5s infinite}
.header-name{font-size:16px;font-weight:600;letter-spacing:-.1px}
.header-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:1px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--good);flex-shrink:0}
.header-right{margin-left:auto;display:flex;gap:8px}
.icon-btn{width:34px;height:34px;border:1px solid var(--line);background:transparent;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink);cursor:pointer;flex-shrink:0}
.icon-btn:hover{background:var(--surface)}

/* Chat */
.chat{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:0}
.sep{text-align:center;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:14px 0}

/* Messages */
.msg-coach{display:flex;gap:10px;align-items:flex-end;margin-bottom:4px;animation:fadeUp .25s ease}
.msg-user{display:flex;justify-content:flex-end;margin-bottom:4px;animation:fadeUp .2s ease}
.avatar-gap{width:32px;flex-shrink:0}
.bubble-coach{max-width:72%;background:var(--surface);border:1px solid var(--line);padding:10px 14px;border-radius:18px 18px 18px 4px;font-size:15px;line-height:1.5;letter-spacing:-.1px;color:var(--ink)}
.bubble-user{max-width:72%;background:var(--accent);color:var(--onAccent);padding:10px 14px;border-radius:18px 18px 4px 18px;font-size:15px;line-height:1.5}

/* Cards */
.card-wrap{max-width:340px;animation:fadeUp .3s ease}
.card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:4px}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.card-heading{font-size:18px;font-weight:600;letter-spacing:-.2px;margin-bottom:4px}
.serif{font-family:'Instrument Serif',Georgia,serif;font-weight:400}
.cta-btn{margin-top:14px;width:100%;height:36px;border:1px solid var(--line);background:transparent;border-radius:10px;color:var(--ink);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer}
.cta-btn:hover{background:var(--surface2)}

/* Typing */
.typing-row{display:flex;gap:10px;align-items:flex-end;margin-bottom:4px}
.typing-bubble{background:var(--surface);border:1px solid var(--line);border-radius:18px 18px 18px 4px;padding:12px 14px;display:flex;gap:4px;align-items:center}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--muted)}

/* Composer */
.composer{border-top:1px solid var(--line);background:var(--bg);flex-shrink:0}
.chips{display:flex;gap:8px;padding:12px 20px 4px;overflow-x:auto;scrollbar-width:none}
.chip{flex-shrink:0;padding:8px 14px;border-radius:18px;border:1px solid var(--line);background:var(--surface);color:var(--inkSoft);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap}
.chip:hover{background:var(--surface2)}
.input-row{display:flex;gap:10px;align-items:center;padding:8px 20px 16px}
.input-pill{flex:1;display:flex;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:6px 6px 6px 16px}
.chat-input{flex:1;border:none;outline:none;background:transparent;font-size:15px;color:var(--ink);font-family:inherit;padding:8px 0}
.chat-input::placeholder{color:var(--muted)}
.send-btn{width:34px;height:34px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s}
.send-btn.on{background:var(--accent);color:var(--onAccent)}
.send-btn.off{background:var(--line);color:var(--muted);cursor:default}

/* Loading screen */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px}
.loading-title{font-size:22px;font-weight:600;letter-spacing:-.3px}
.loading-sub{font-size:14px;color:var(--muted)}
.spinner{width:28px;height:28px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-radius:12px;overflow:hidden;margin-top:14px}
.stat-cell{background:var(--surface);padding:10px 12px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.stat-val{font-size:20px;font-weight:500;font-feature-settings:'tnum'}
</style>
</head>
<body>

<div class="header">
  <div class="avatar" id="avatar">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3z" fill="white"/></svg>
  </div>
  <div>
    <div class="header-name">Mancuso Method</div>
    <div class="header-status"><span class="dot"></span><span id="status-text">Loading your data...</span></div>
  </div>
  <div class="header-right">
    <button class="icon-btn" onclick="loadAndStart()" title="Refresh briefing">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
  </div>
</div>

<div class="chat" id="chat">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-title">Good morning, Gina</div>
    <div class="loading-sub">Syncing with Garmin & Oura...</div>
  </div>
</div>

<div class="composer" id="composer" style="display:none">
  <div class="chips" id="chips"></div>
  <div class="input-row">
    <div class="input-pill">
      <input class="chat-input" id="input" placeholder="Message your coach..." onkeydown="if(event.key==='Enter')send()"/>
      <button class="send-btn off" id="send-btn" onclick="send()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4 20-7z"/><path d="M22 2 11 13"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const API = 'http://127.0.0.1:5001';
const ANTHROPIC = 'https://api.anthropic.com/v1/messages';
let DATA = null;
let messages = [];
let typing = false;

const CHIPS_INIT = ["Why am I here today?","What should I eat first?","How was my sleep?","Show me this week"];
const CHIPS_FALL = ["How's my recovery trend?","What if I skip today?","Nutrition tips?","Tell me about my HRV"];

// ── Fetch live data ──────────────────────────────────────────────────
async function loadAndStart() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('composer').style.display = 'none';
  document.getElementById('chat').innerHTML = '<div class="loading" id="loading"><div class="spinner"></div><div class="loading-title">Good morning, Gina</div><div class="loading-sub">Syncing with Garmin & Oura...</div></div>';
  messages = [];

  try {
    const r = await fetch(`${API}/data`);
    DATA = await r.json();
    document.getElementById('status-text').textContent = `Synced · ${DATA.days_to_hyrox} days to Hyrox`;
    document.getElementById('chat').innerHTML = '';
    document.getElementById('composer').style.display = 'block';
    renderChips(CHIPS_INIT);
    runBriefing();
  } catch(e) {
    document.getElementById('chat').innerHTML = '<div class="loading"><div class="loading-sub" style="color:#C95A3F">Could not connect to API. Make sure api.py is running.</div></div>';
  }
}

// ── Build briefing thread ────────────────────────────────────────────
function runBriefing() {
  const d = DATA;
  const readinessMsg = d.readiness.score >= 80
    ? `Readiness is ${d.readiness.score} — you're in a good window today. HRV balanced, Body Battery recharged well.`
    : `Readiness at ${d.readiness.score} — functional but not at peak. Be deliberate today, not heroic.`;

  const thread = [
    {role:'sep', text:`Today · ${d.date} · ${d.days_to_hyrox} days to Hyrox Open`},
    {role:'coach', text:`Good morning, Gina. ${readinessMsg}`},
    {role:'card', card:'readiness'},
    {role:'coach', text:`Sleep last night was ${d.sleep.total_hours}h — ${d.sleep.total_hours >= 7 ? 'solid' : 'a touch short'}. Resting HR at ${d.sleep.resting_hr}bpm, HRV ${d.sleep.hrv_ms}ms.`},
    {role:'card', card:'sleep'},
    {role:'coach', text:`Nutrition yesterday: ${d.nutrition.calories} of ${d.nutrition.target_kcal} calories — ${d.nutrition.calories < d.nutrition.target_kcal * 0.85 ? "that deficit matters today" : "solid fueling"}. Protein at ${d.nutrition.protein_g}g.`},
    {role:'card', card:'nutrition'},
  ];

  messages = [
    {role:'user', content:`My data: ${JSON.stringify(d)}`},
    {role:'assistant', content:'I have your data. Ready to coach.'},
  ];

  let i = 0;
  function tick() {
    if (i >= thread.length) return;
    appendMsg(thread[i]);
    if (thread[i].role === 'coach' || thread[i].role === 'sep') {
      messages.push({role:'assistant', content: thread[i].text || ''});
    }
    i++;
    setTimeout(tick, i < 2 ? 400 : i < 4 ? 600 : 700);
  }
  tick();
}

// ── Render messages ──────────────────────────────────────────────────
function appendMsg(m) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');

  if (m.role === 'sep') {
    div.className = 'sep'; div.textContent = m.text;
  } else if (m.role === 'coach') {
    div.className = 'msg-coach';
    div.innerHTML = `<div class="avatar-gap"><div class="avatar"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3z" fill="white"/></svg></div></div><div class="bubble-coach">${m.text}</div>`;
  } else if (m.role === 'user') {
    div.className = 'msg-user';
    div.innerHTML = `<div class="bubble-user">${m.text}</div>`;
  } else if (m.role === 'card') {
    div.className = 'msg-coach';
    div.innerHTML = `<div class="avatar-gap"></div><div class="card-wrap">${buildCard(m.card)}</div>`;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function buildCard(type) {
  const d = DATA;
  if (type === 'readiness') {
    const r = d.readiness;
    const C = 2 * Math.PI * 44;
    const dash = (r.score / 100) * C;
    const rc = r.band === 'good' ? '#3F7D5A' : r.band === 'fair' ? '#D86B4A' : '#C95A3F';
    const drivers = r.drivers.map(dr => `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <div style="width:6px;height:22px;border-radius:3px;background:${dr.impact < 0 ? '#C95A3F' : '#3F7D5A'};opacity:.6;flex-shrink:0"></div>
        <div style="flex:1"><div style="font-size:13px;font-weight:500">${dr.label}</div><div style="font-size:12px;color:var(--muted)">${dr.note}</div></div>
        <div style="font-size:12px;font-weight:600;color:${dr.impact < 0 ? '#C95A3F' : '#3F7D5A'}">${dr.impact > 0 ? '+' : ''}${dr.impact}</div>
      </div>`).join('');
    return `<div class="card">
      <div style="display:flex;align-items:center;gap:18px">
        <div style="position:relative;width:110px;height:110px;flex-shrink:0">
          <svg width="110" height="110" viewBox="0 0 110 110">
            <circle cx="55" cy="55" r="44" stroke="var(--line)" stroke-width="9" fill="none"/>
            <circle cx="55" cy="55" r="44" stroke="${rc}" stroke-width="9" fill="none" stroke-linecap="round" stroke-dasharray="${dash} ${C}" transform="rotate(-90 55 55)"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <div class="serif" style="font-size:38px;line-height:1">${r.score}</div>
            <div style="font-size:10px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-top:2px">${r.band}</div>
          </div>
        </div>
        <div style="flex:1">
          <div class="eyebrow">Readiness</div>
          <div class="card-heading">${r.score >= 80 ? 'Ready to work' : 'Be deliberate today'}</div>
          <div style="font-size:13px;color:var(--muted)">${r.delta_vs_7day > 0 ? '+' : ''}${r.delta_vs_7day} vs 7-day avg</div>
        </div>
      </div>
      <div style="margin-top:14px">${drivers}</div>
      <button class="cta-btn" onclick="inject('Why is my readiness ${r.score} today?')">Ask why →</button>
    </div>`;
  }

  if (type === 'sleep') {
    const s = d.sleep;
    const sc = {Awake:'var(--muted)',REM:'rgba(216,107,74,.85)',Light:'rgba(224,168,120,.55)',Deep:'var(--ink)'};
    const stages = s.stages.map(st => `<div style="flex:${st.pct};background:${sc[st.label]}"></div>`).join('');
    const legend = s.stages.map(st => `<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)"><div style="width:8px;height:8px;border-radius:2px;background:${sc[st.label]}"></div>${st.label} ${st.hours}h</div>`).join('');
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px">
        <div><div class="eyebrow">Last night</div>
          <div style="display:flex;align-items:baseline;gap:6px"><span class="serif" style="font-size:38px;line-height:1">${s.total_hours}</span><span style="font-size:13px;color:var(--muted)">hrs</span></div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">target ${s.target_hours}h</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--muted)">${s.bedtime} → ${s.wake}</div>
          <div style="font-size:12px;margin-top:2px">${s.efficiency}% efficient</div>
        </div>
      </div>
      <div style="display:flex;height:30px;border-radius:6px;overflow:hidden;gap:2px">${stages}</div>
      <div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap">${legend}</div>
      <div class="stats-grid">
        <div class="stat-cell"><div class="stat-label">Resting HR</div><div class="stat-val">${s.resting_hr} <span style="font-size:12px;color:var(--muted);font-weight:400">bpm</span></div></div>
        <div class="stat-cell"><div class="stat-label">HRV</div><div class="stat-val">${s.hrv_ms} <span style="font-size:12px;color:var(--warn);font-weight:500">↓ ${s.hrv_baseline - s.hrv_ms}ms</span></div></div>
      </div>
    </div>`;
  }

  if (type === 'nutrition') {
    const n = d.nutrition;
    const pct = Math.round((n.calories / n.target_kcal) * 100);
    const macros = [
      {label:'Protein', g:n.protein_g, kcal:n.protein_g*4, color:'var(--accent)'},
      {label:'Carbs', g:n.carbs_g, kcal:n.carbs_g*4, color:'var(--accent2)'},
      {label:'Fat', g:n.fat_g, kcal:n.fat_g*9, color:'var(--ink)'},
    ];
    const total = macros.reduce((s,m)=>s+m.kcal,0);
    const bar = macros.map(m=>`<div style="flex:${m.kcal/total};background:${m.color}"></div>`).join('');
    const legend = macros.map(m=>`<div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:2px;background:${m.color}"></div><span style="font-size:12px">${m.label}</span><span style="font-size:12px;color:var(--muted)">${m.g}g</span></div>`).join('');
    return `<div class="card">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px">
        <div><div class="eyebrow">Yesterday's fuel</div>
          <div style="display:flex;align-items:baseline;gap:6px"><span class="serif" style="font-size:36px;line-height:1">${n.calories}</span><span style="font-size:13px;color:var(--muted)"> / ${n.target_kcal} kcal</span></div>
        </div>
        <div style="font-size:12px;font-weight:600;background:${pct>=85?'rgba(63,125,90,.2)':'rgba(201,90,63,.2)'};color:${pct>=85?'#3F7D5A':'#C95A3F'};padding:4px 8px;border-radius:8px">${pct}% of goal</div>
      </div>
      <div style="display:flex;height:6px;border-radius:3px;overflow:hidden;margin-top:14px;margin-bottom:6px;gap:1.5px">${bar}</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">${legend}</div>
      <button class="cta-btn" onclick="inject('What should I prioritize eating today given yesterday\\'s intake?')">Fueling advice →</button>
    </div>`;
  }
  return '';
}

// ── Send message ─────────────────────────────────────────────────────
function renderChips(arr) {
  document.getElementById('chips').innerHTML = arr.map(c=>`<button class="chip" onclick="inject('${c.replace(/'/g,"\\'")}')">${c}</button>`).join('');
}

function inject(text) {
  document.getElementById('input').value = text;
  updateSend();
  send();
}

function updateSend() {
  const v = document.getElementById('input').value.trim();
  document.getElementById('send-btn').className = 'send-btn ' + (v ? 'on' : 'off');
}

document.getElementById('input').addEventListener('input', updateSend);

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || typing) return;
  input.value = ''; updateSend();

  appendMsg({role:'user', text});
  messages.push({role:'user', content:text});
  renderChips([]);
  typing = true;
  document.getElementById('avatar').classList.add('pulsing');
  showTyping();

  const sysPrompt = `You are Gina's personal AI recovery and performance coach. Be direct, specific, and reference her actual data. No fluff.

ATHLETE PROFILE:
- Gina Mancuso, 43yr female, single mom, high school teacher (school ends May 18), UVA Data Science grad student
- Competitive Hyrox athlete (normally Pro level) and tennis player
- Right hip surgery: December 9, 2025 (~5 months ago)
- Left hip surgery: March 13, 2026 (~8 weeks ago, MOST RECENT AND SENSITIVE)
- Currently in PT 2x/week focused on hip strength and single-leg stability
- Right quad/knee weaker due to ACL history
- Target: Hyrox Open June 7, 2026 (${DATA.days_to_hyrox} days away)
- Currently training: Indoor Cycling, Spin Class, Elliptical, Strength Training, Rowing (no running yet), Hyrox-specific drills as tolerated

TODAY'S DATA:
- Readiness: ${DATA.readiness.score}/100 (${DATA.readiness.band})
- HRV: ${DATA.sleep.hrv_ms}ms (baseline 55ms)
- Sleep: ${DATA.sleep.total_hours}h (target 7.5h), RHR ${DATA.sleep.resting_hr}bpm
- Nutrition yesterday: ${DATA.nutrition.calories}/${DATA.nutrition.target_kcal} kcal, ${DATA.nutrition.protein_g}g protein, ${DATA.nutrition.carbs_g}g carbs, ${DATA.nutrition.fat_g}g fat

YESTERDAY'S CONVERSATION:
${DATA.prev_conversation || 'No previous conversation logged.'}

COACHING RULES:
- Reply in 2-4 sentences max
- Be direct and specific — reference actual numbers
- No bullet points, no markdown, plain conversational text
- Hip flexors always the priority safety concern
- Call out nutrition gaps by name with specific fixes`;

  try {
    const resp = await fetch('http://127.0.0.1:5001/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            system: sysPrompt,
            messages: messages.filter(m => m.role === 'user' || m.role === 'assistant').slice(-10)
        })
    });
    const data = await resp.json();
    const reply = data.reply;
    hideTyping();
    appendMsg({role:'coach', text: reply || 'Got it — let me know if you want to dig into any part of your data.'});
    messages.push({role:'assistant', content:reply});
    renderChips(CHIPS_FALL);
  } catch(e) {
    hideTyping();
    appendMsg({role:'coach', text:"Connection issue — check your API key and try again."});
  } finally {
    typing = false;
    document.getElementById('avatar').classList.remove('pulsing');
  }
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.id = 'typing'; div.className = 'typing-row';
  div.innerHTML = `<div class="avatar-gap"><div class="avatar pulsing"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3z" fill="white"/></svg></div></div><div class="typing-bubble"><div class="typing-dot" style="animation:lumenDot 1.2s infinite 0s"></div><div class="typing-dot" style="animation:lumenDot 1.2s infinite .15s"></div><div class="typing-dot" style="animation:lumenDot 1.2s infinite .3s"></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

// Auto-load on open
loadAndStart();
</script>
